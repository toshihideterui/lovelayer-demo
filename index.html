<style>
  :root {
    --void: #110508; --deep: #1a0a10; --ink: #220d15;
    --rose: #c94c7a; --rose-dim: #7a2a48; --rose-bright: #f080a8;
    --gold: #c9a84c; --gold-dim: #7a6230;
    --lavender: #a070c0; --mist: #2a1020;
    --text: #e8d0d8; --text-dim: #7a6068;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--void); color: var(--text);
    font-family: 'Noto Serif JP', serif; font-weight: 200;
    min-height: 100vh; overflow-x: hidden; cursor: crosshair;
  }

  #skyCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    width: 100%; height: 100%;
  }

  .lang-bar {
    position: fixed; top: 0; right: 0; left: 0; z-index: 100;
    display: flex; justify-content: center; align-items: center;
    padding: 8px 16px; gap: 2px; flex-wrap: nowrap; overflow-x: auto;
    background: linear-gradient(to bottom, rgba(17,5,8,0.95) 0%, transparent 100%);
    scrollbar-width: none;
  }
  .lang-bar::-webkit-scrollbar { display: none; }
  .lang-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 10px 12px; background: transparent;
    border: 1px solid transparent; border-radius: 2px;
    color: var(--text-dim); font-family: inherit; font-size: 0.68rem;
    letter-spacing: 0.04em; cursor: pointer; transition: all 0.25s; white-space: nowrap;
    -webkit-tap-highlight-color: rgba(201,76,122,0.2);
    touch-action: manipulation; min-height: 44px;
  }
  .lang-btn:hover { color: var(--text); border-color: rgba(201,76,122,0.2); }
  .lang-btn.active { color: var(--rose); border-color: rgba(201,76,122,0.35); background: rgba(201,76,122,0.06); }

  .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 24px; }

  header { text-align: center; padding: 100px 0 50px; }
  .heart-sigil { width: 80px; height: 80px; margin: 0 auto 28px; position: relative; }
  .heart-sigil svg { width: 100%; height: 100%; animation: pulse-heart 3s ease-in-out infinite; }
  .heart-sigil::after {
    content: ''; position: absolute; inset: -12px; border-radius: 50%;
    background: radial-gradient(circle, rgba(201,76,122,0.2) 0%, transparent 70%);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-heart {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  @keyframes pulse-glow { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)} }

  h1 {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(2rem, 5vw, 3rem); letter-spacing: 0.25em;
    color: var(--rose-bright); margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(201,76,122,0.4);
  }
  .subtitle {
    font-size: 0.72rem; letter-spacing: 0.35em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 40px;
  }

  .oracle-form {
    position: relative; border: 1px solid rgba(201,76,122,0.15);
    padding: 40px 32px; margin-bottom: 60px; background: rgba(34,13,21,0.6);
    backdrop-filter: blur(10px);
  }
  .corner {
    position: absolute; width: 16px; height: 16px;
    border-color: var(--rose-dim); border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .corner.tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  .persons-wrap {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;
  }
  @media (max-width: 560px) { .persons-wrap { grid-template-columns: 1fr; } }

  .person-card {
    border: 1px solid rgba(201,76,122,0.12); padding: 20px 16px;
    background: rgba(201,76,122,0.03);
  }
  .person-label {
    font-size: 0.68rem; letter-spacing: 0.2em; color: var(--rose-dim);
    margin-bottom: 14px; text-align: center; text-transform: uppercase;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 0.65rem; letter-spacing: 0.15em;
    color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase;
  }
  .field input, .field select, .field textarea {
    width: 100%; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,76,122,0.15); border-radius: 1px;
    color: var(--text); padding: 10px 14px; outline: none;
    font-family: inherit; font-size: 0.82rem; transition: border-color .3s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: rgba(201,76,122,0.4);
  }
  .field select option { background: #220d15; }

  .apikey-wrap { margin-bottom: 24px; }

  .invoke-btn {
    width: 100%; padding: 16px; background: transparent;
    border: 1px solid rgba(201,76,122,0.4); color: var(--rose-bright);
    font-family: inherit; font-size: 0.8rem; letter-spacing: 0.25em;
    cursor: pointer; transition: all .4s; text-transform: uppercase;
    touch-action: manipulation;
  }
  .invoke-btn:hover {
    background: rgba(201,76,122,0.08);
    border-color: rgba(201,76,122,0.7);
    box-shadow: 0 0 30px rgba(201,76,122,0.15);
  }

  .error-msg {
    display: none; margin-top: 16px; padding: 12px 16px;
    border: 1px solid rgba(201,76,122,0.3); color: #e08090;
    font-size: 0.75rem; letter-spacing: 0.05em; line-height: 1.8;
  }
  .error-msg.show { display: block; }

  .loading-veil { display:none; text-align:center; padding:60px 0; }
  .loading-veil.show { display:block; }
  .orb {
    width: 60px; height: 60px; margin: 0 auto 24px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(201,76,122,0.8), rgba(120,32,96,0.4));
    box-shadow: 0 0 40px rgba(201,76,122,0.3);
    animation: orb-spin 2s ease-in-out infinite;
  }
  @keyframes orb-spin {
    0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(201,76,122,0.3)}
    50%{transform:scale(1.2);box-shadow:0 0 60px rgba(201,76,122,0.5),0 0 100px rgba(120,32,96,0.3)}
  }
  .loading-text {
    font-size: 0.7rem; letter-spacing: 0.4em; color: var(--text-dim);
    text-transform: uppercase; animation: fade-text 1.5s ease-in-out infinite;
  }
  @keyframes fade-text { 0%,100%{opacity:0.3} 50%{opacity:1} }

  .result-scroll {
    display: none; margin-bottom: 60px;
    border: 1px solid rgba(201,76,122,0.2); padding: 40px 32px;
    background: rgba(34,13,21,0.7); backdrop-filter: blur(10px);
    animation: fadeIn 0.8s ease;
  }
  .result-scroll.show { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .result-header { text-align: center; margin-bottom: 32px; }
  .compatibility-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 10vw, 5rem); color: var(--rose-bright);
    text-shadow: 0 0 40px rgba(201,76,122,0.5); line-height: 1;
    margin-bottom: 8px;
  }
  .score-label {
    font-size: 0.65rem; letter-spacing: 0.3em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 16px;
  }
  .result-names {
    font-size: 1.1rem; letter-spacing: 0.15em; color: var(--text);

  }
  .result-meta {
    font-size: 0.65rem; letter-spacing: 0.12em; color: var(--text-dim);

  }
  .divider {
    text-align: center; margin: 28px 0;
    font-size: 0.7rem; letter-spacing: 0.3em; color: var(--rose-dim);

  .fortune-text {

  .reset-btn {

    background: transparent; border: 1px solid rgba(201,76,122,0.25);

  footer {
    text-align: center; padding: 40px 0 60px;
    font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-dim);

// ストレージ
function storageSave(key, value) {
  try { localStorage.setItem(key, value); } catch(e) {}
  try {
    const expires = new Date();
    expires.setFullYear(expires.getFullYear() + 1);
    document.cookie = encodeURIComponent(key) + '=' + encodeURIComponent(value) + '; expires=' + expires.toUTCString() + '; path=/; SameSite=Lax';
  } catch(e) {}
}
function storageLoad(key) {
  try { const v = localStorage.getItem(key); if (v !== null) return v; } catch(e) {}
  try {
    const name = encodeURIComponent(key) + '=';
    for (let p of document.cookie.split(';')) {
      p = p.trim();
      if (p.startsWith(name)) return decodeURIComponent(p.substring(name.length));
    }
  } catch(e) {}
  return null;
}

  ja: ['山羊座','水瓶座','魚座','牡羊座','牡牛座','双子座','蟹座','獅子座','乙女座','天秤座','蠍座','射手座'],
  en: ['Capricorn','Aquarius','Pisces','Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius'],
  zh: ['摩羯座','水瓶座','双鱼座','白羊座','金牛座','双子座','巨蟹座','狮子座','处女座','天秤座','天蝎座','射手座'],
  ko: ['염소자리','물병자리','물고기자리','양자리','황소자리','쌍둥이자리','게자리','사자자리','처녀자리','천칭자리','전갈자리','사수자리'],
  fr: ['Capricorne','Verseau','Poissons','Bélier','Taureau','Gémeaux','Cancer','Lion','Vierge','Balance','Scorpion','Sagittaire'],
};
const CUTS = [[1,20],[2,19],[3,21],[4,20],[5,21],[6,22],[7,23],[8,23],[9,23],[10,24],[11,23],[12,22]];

function getZodiac(dateStr) {
  const d = new Date(dateStr);
  const m = d.getMonth()+1, day = d.getDate();
  const names = ZODIAC[currentLang] || ZODIAC.en;
  for (let i=0;i<CUTS.length;i++) {
    const [cm,cd] = CUTS[i];
    if (m<cm||(m===cm&&day<cd)) return names[i];
  }
  return names[0];
}

function getLifeNum(dateStr) {
  let s = dateStr.replace(/-/g,'').split('').map(Number).reduce((a,b)=>a+b,0);
  while(s>9&&s!==11&&s!==22) s=String(s).split('').map(Number).reduce((a,b)=>a+b,0);
  return s;
}

const KYUSEI_JA = ['五黄土星','四緑木星','三碧木星','二黒土星','一白水星','九紫火星','八白土星','七赤金星','六白金星'];
function getKyusei(dateStr) {
  const yr = new Date(dateStr).getFullYear();
  return KYUSEI_JA[(9-((yr-1900)%9))%9];
}

function getStrokeCount(char) {
  const strokes = {
    '一':1,'二':2,'三':3,'四':5,'五':4,'六':6,'七':7,'八':8,'九':9,'十':2,
    '山':3,'川':3,'田':5,'木':4,'水':4,'火':4,'土':3,'金':8,'日':4,'月':4,
    '花':7,'空':8,'海':9,'星':9,'光':6,'風':9,'雨':8,'雪':11,'愛':13,'夢':13,
    '希':7,'望':11,'幸':8,'福':13,'美':9,'純':10,'心':4,'魂':14,

    '健':11,'勇':9,'智':12,'仁':4,'義':13,'礼':5,'和':8,'平':5,'安':6,'清':11,
    '春':9,'夏':10,'秋':9,'冬':5,'桜':10,'梅':10,'松':8,'竹':6,'菊':11,'蓮':13,
    '龍':16,'鳳':14,'麗':19,'優':17,'雅':13,'凛':15,'彩':11,'碧':14,'瑠':14,'璃':15,
    '翔':12,'颯':14,'蒼':13,'朔':10,'律':9,'奏':9,'澪':16,'紬':11,'詩':13,

  return strokes[char] || 10;

function getSeimei(lastName, firstName) {
  if (!lastName && !firstName) return null;
  const lastStrokes = lastName.split('').reduce((s,c)=>s+getStrokeCount(c),0);
  const firstStrokes = firstName.split('').reduce((s,c)=>s+getStrokeCount(c),0);
  function getKikyo(n) {
    const num = n%81||81;
    const kichi=[1,3,5,6,7,8,11,13,15,16,17,18,21,23,24,25,29,31,32,33,35,37,38,39,41,45,47,48,52,57,58,61,63,65,67,68,81];
    return kichi.includes(num)?'吉':'凶';
  }
  const tenkaku=lastStrokes, chikaku=firstStrokes;
  const jinkaku=lastStrokes+firstStrokes;
  const gaikaku=lastStrokes+firstStrokes+1;
  const sokaku=lastStrokes+firstStrokes;
  return { tenkaku, chikaku, jinkaku, gaikaku, sokaku,
    tenkakuKikyo:getKikyo(tenkaku), chikakuKikyo:getKikyo(chikaku),
    jinkakuKikyo:getKikyo(jinkaku), sokakuKikyo:getKikyo(sokaku) };
}

    kyusei: getKyusei(bdB),

  document.getElementById('formSection').style.display = 'none';

  document.getElementById('resultScroll').className = 'result-scroll';

  const prompt = t.system + '\n\n' + t.buildUser(pdataA, pdataB, q);

  const GROQ_MODELS = ['llama-3.3-70b-versatile','llama3-70b-8192','gemma2-9b-it','llama3-8b-8192'];
  let text = '';

      const data = await res.json();

      }

  if (!groqSucceeded) throw new Error('GROQ_FAILED:' + groqLastErr);

  // スコア抽出

  const score = scoreMatch ? Math.min(100, parseInt(scoreMatch[1])) : 75;

// Night Sky Canvas（ピンク系）
// ══════════════════════════════════════════
(function() {
  const canvas = document.getElementById('skyCanvas');
  const ctx = canvas.getContext('2d');

  function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize();
  window.addEventListener('resize', ()=>{ resize(); initStars(); });

  const STAR_COUNT = 280;
  let stars = [];
  function initStars() {
    stars = [];
    for (let i=0;i<STAR_COUNT;i++) {
      const r = Math.random();
      stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        radius: r<0.6?Math.random()*0.8+0.2:r<0.9?Math.random()*1.2+0.8:Math.random()*1.8+1.2,
        baseAlpha: Math.random()*0.5+0.3,
        alpha: 0,
        twinkleSpeed: Math.random()*0.02+0.005,
        twinkleOffset: Math.random()*Math.PI*2,
        color: r<0.15?'#f080a8':r<0.25?'#c0a0c8':'#ffffff',
      });
    }
  }

  function drawNebula() {
    const blobs=[
      {x:0.2,y:0.3,rx:0.3,ry:0.25,color:'rgba(120,20,60,0.15)'},
      {x:0.8,y:0.6,rx:0.25,ry:0.3,color:'rgba(80,20,80,0.18)'},
      {x:0.5,y:0.1,rx:0.2,ry:0.15,color:'rgba(180,40,100,0.08)'},
    ];
    blobs.forEach(b=>{
      const grd=ctx.createRadialGradient(b.x*canvas.width,b.y*canvas.height,0,b.x*canvas.width,b.y*canvas.height,Math.max(b.rx*canvas.width,b.ry*canvas.height));
      grd.addColorStop(0,b.color); grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd; ctx.beginPath();
      ctx.ellipse(b.x*canvas.width,b.y*canvas.height,b.rx*canvas.width,b.ry*canvas.height,0,0,Math.PI*2);
      ctx.fill();
    });
  }

  const METEOR_MAX=5; let meteors=[];
  function spawnMeteor() {
    if(meteors.length>=METEOR_MAX) return;
    const angle=(Math.random()*30+15)*Math.PI/180;
    const speed=Math.random()*8+6;
    const len=Math.random()*180+80;
    const startX=Math.random()*canvas.width*1.2-canvas.width*0.1;
    const startY=Math.random()*canvas.height*0.5;
    const brightness=Math.random()*0.4+0.6;
    const hue=Math.random()<0.4?`rgba(240,128,168,${brightness})`:`rgba(255,255,255,${brightness})`;
    meteors.push({x:startX,y:startY,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,len,color:hue,alpha:0,phase:'fadein',life:0,maxLife:Math.random()*40+30,trail:[]});
  }
  function scheduleMeteor() { const delay=Math.random()*2500+800; setTimeout(()=>{spawnMeteor();scheduleMeteor();},delay); }
  scheduleMeteor();
  setTimeout(spawnMeteor,400); setTimeout(spawnMeteor,1200);

  function updateMeteors() {
    meteors=meteors.filter(m=>m.phase!=='dead');
    meteors.forEach(m=>{
      m.trail.push({x:m.x,y:m.y});
      if(m.trail.length>22)m.trail.shift();
      m.x+=m.vx;m.y+=m.vy;m.life++;
      if(m.phase==='fadein'){m.alpha=Math.min(1,m.alpha+0.08);if(m.alpha>=1)m.phase='live';}
      else if(m.phase==='live'){if(m.life>m.maxLife)m.phase='fadeout';}
      else if(m.phase==='fadeout'){m.alpha=Math.max(0,m.alpha-0.06);if(m.alpha<=0)m.phase='dead';}
      if(m.x>canvas.width+200||m.y>canvas.height+200)m.phase='dead';
    });
  }

  function drawMeteors() {
    meteors.forEach(m=>{
      if(m.trail.length<2)return;
      ctx.save();ctx.globalAlpha=m.alpha;
      const headGrd=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,3.5);
      headGrd.addColorStop(0,'rgba(255,255,255,0.9)');
      headGrd.addColorStop(0.4,m.color.replace(/[\d.]+\)$/,'0.6)'));
      headGrd.addColorStop(1,'transparent');
      ctx.fillStyle=headGrd;ctx.beginPath();ctx.arc(m.x,m.y,3.5,0,Math.PI*2);ctx.fill();
      for(let i=1;i<m.trail.length;i++){
        const t=i/m.trail.length;
        ctx.beginPath();ctx.moveTo(m.trail[i-1].x,m.trail[i-1].y);ctx.lineTo(m.trail[i].x,m.trail[i].y);
        ctx.strokeStyle=m.color.replace(/[\d.]+\)$/,`${t*0.4})`);ctx.lineWidth=t*1.5;ctx.stroke();
      }
      ctx.restore();
    });
  }

  let frame=0;
  function draw() {
    ctx.fillStyle='rgba(17,5,8,0.15)';ctx.fillRect(0,0,canvas.width,canvas.height);
    if(frame===0){ctx.fillStyle='#110508';ctx.fillRect(0,0,canvas.width,canvas.height);drawNebula();}
    stars.forEach(s=>{
      s.alpha=s.baseAlpha*(0.5+0.5*Math.sin(frame*s.twinkleSpeed+s.twinkleOffset));
      ctx.globalAlpha=s.alpha;ctx.fillStyle=s.color;
      ctx.beginPath();ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    updateMeteors();drawMeteors();
    frame++;requestAnimationFrame(draw);
  }
  initStars();draw();
})();
